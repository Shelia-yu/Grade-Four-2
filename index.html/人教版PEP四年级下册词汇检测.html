    <style>

            { word: "lunch", meaning: "午餐" }, { word: "maths", meaning: "数学" },
            { word: "get up", meaning: "起床" }, { word: "go to school", meaning: "上学" },
            { word: "go home", meaning: "回家" }, { word: "go to bed", meaning: "上床睡觉" },

        ],

            { word: "jacket", meaning: "夹克衫" }, { word: "skirt", meaning: "裙子" },
            { word: "dear", meaning: "天哪" }, { word: "expensive", meaning: "昂贵的；价格高的" },
            { word: "take", meaning: "买下" }, { word: "cheap", meaning: "便宜的" },
            { word: "shoe", meaning: "鞋" }, { word: "beautiful", meaning: "美丽的" },
            { word: "hat", meaning: "帽子" }, { word: "sunglasses", meaning: "太阳镜；墨镜" },
            { word: "free", meaning: "免费的" }, { word: "large", meaning: "（服装、食物、日用品等）大型号的" },
            { word: "size", meaning: "尺码；号" }, { word: "list", meaning: "清单；目录" },
            { word: "try on", meaning: "试穿" }, { word: "any", meaning: "任何的；任一的" }
        ],
        U5: [

            { word: "sheep", meaning: "绵羊" }, { word: "pig", meaning: "猪" },
            { word: "chicken", meaning: "鸡；鸡肉" }, { word: "tomato", meaning: "西红柿" },
            { word: "bee", meaning: "蜜蜂" }, { word: "mouse", meaning: "老鼠" },

        ],
        U6: [
            { word: "feed", meaning: "给（人或动物）食物；饲养" }, { word: "pass", meaning: "给；递" },
            { word: "pick", meaning: "采；摘" }, { word: "milk", meaning: "挤奶" },
            { word: "knife", meaning: "刀" }, { word: "fork", meaning: "餐叉" },
            { word: "chopstick", meaning: "(常用复数)筷子" }, { word: "waste", meaning: "浪费；废品" },
            { word: "food", meaning: "菜肴；食物" }, { word: "delicious", meaning: "美味的；可口的" },
            { word: "clear the table", meaning: "收拾餐桌" }, { word: "bowl", meaning: "碗" },
            { word: "spoon", meaning: "勺；匙；调羹" }, { word: "set the table", meaning: "摆放餐具" },
            { word: "supermarket", meaning: "超市" }, { word: "by oneself", meaning: "（某人）独立地；单独" },

            { word: "ad", meaning: "广告" }

    let allWordsWithUnit = [];
    for (let unit in vocabularyDB) {
        vocabularyDB[unit].forEach(item => {
            allWordsWithUnit.push({
                word: item.word,
                meaning: item.meaning,
                unit: unit
            });
        });
    }

    let currentUnit = "ALL";
    let currentWordObj = null;
    let lastWordObj = null;
    let mistakeList = [];
    
    // DOM 元素
    const speakerBtn = document.getElementById('speakerBtn');
    const answerInput = document.getElementById('answerInput');
    const feedbackEmoji = document.getElementById('feedbackEmoji');
    const feedbackText = document.getElementById('feedbackText');
    const chineseHintDiv = document.getElementById('chineseHint');
    const replayBtn = document.getElementById('replayBtn');
    const cantWriteBtn = document.getElementById('cantWriteBtn');
    const showChineseBtn = document.getElementById('showChineseBtn');
    const unitSelectBtn = document.getElementById('unitSelectBtn');
    const unitDropdown = document.getElementById('unitDropdown');
    const unitDisplaySpan = document.getElementById('unitDisplay');
    const mistakeLibraryBtn = document.getElementById('mistakeLibraryBtn');
    const mistakeModal = document.getElementById('mistakeModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const mistakeListContainer = document.getElementById('mistakeListContainer');

    // ==================== 专业发音引擎 ====================
    // 使用有道词典官方发音接口 (美式发音, 高清)
    function speakWordProfessional(word) {
        return new Promise((resolve, reject) => {
            // 对短语进行URL编码
            const encodedWord = encodeURIComponent(word.toLowerCase());
            // 有道发音API - 美式发音 (type=1 美式, type=0 英式)
            const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodedWord}&type=1`;
            
            const audio = new Audio();
            
            // 添加加载状态
            speakerBtn.classList.add('loading');
            
            audio.oncanplaythrough = () => {
                speakerBtn.classList.remove('loading');
                audio.play().catch(err => {
                    console.warn("有道发音播放失败，尝试备用方案", err);
                    speakerBtn.classList.remove('loading');
                    fallbackSpeak(word);
                });
            };
            
            audio.onerror = () => {
                console.warn("有道发音加载失败，使用备用语音");
                speakerBtn.classList.remove('loading');
                fallbackSpeak(word);
            };
            
            audio.onended = () => {
                resolve();
            };
            
            audio.src = audioUrl;
            
            // 设置超时，避免长时间等待
            setTimeout(() => {
                if (speakerBtn.classList.contains('loading')) {
                    speakerBtn.classList.remove('loading');
                    fallbackSpeak(word);
                }
            }, 3000);
        });
    }
    
    // 备用发音方案：使用浏览器语音合成（作为保底）
    function fallbackSpeak(word) {
        if (!window.speechSynthesis) {
            console.warn("浏览器不支持语音");
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        
        // 尝试选择更好的英语语音
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Google'));
        if (preferredVoice) utterance.voice = preferredVoice;
        
        window.speechSynthesis.speak(utterance);
    }
    
    // 主发音函数（优先有道高清发音）
    async function speakWord(word) {
        try {
            await speakWordProfessional(word);
        } catch (e) {
            fallbackSpeak(word);
        }
    }

    // 音效函数
    function playCorrectSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.3;
            oscillator.type = "sine";
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
            oscillator.stop(audioCtx.currentTime + 0.5);
            setTimeout(() => { audioCtx.close().catch(e=>console.log); }, 800);
        } catch(e) { console.warn("音效失败", e); }
    }

    function playWrongSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 440;
            gainNode.gain.value = 0.25;
            oscillator.type = "sawtooth";
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.45);
            setTimeout(() => { audioCtx.close().catch(e=>console.log); }, 700);
        } catch(e) { console.warn("音效失败", e); }
    }

    function addToMistakeList(wordObj) {
        if (!wordObj) return;
        const exists = mistakeList.some(item => item.word === wordObj.word && item.unit === wordObj.unit);
        if (!exists) {
            mistakeList.push({
                word: wordObj.word,
                meaning: wordObj.meaning,
                unit: wordObj.unit
            });
        }
    }

    function getUnitDisplayName(unitCode) {
        const map = { "U1": "第一单元", "U2": "第二单元", "U3": "第三单元",
            "U4": "第四单元", "U5": "第五单元", "U6": "第六单元" };
        return map[unitCode] || unitCode;
    }

    function renderMistakeModal() {
        if (mistakeList.length === 0) {
            mistakeListContainer.innerHTML = '<div class="empty-mistake">✨ 暂无错题，太棒啦！继续加油 ✨</div>';
            return;
        }
        let html = '';
        mistakeList.forEach(item => {
            html += `
                <div class="mistake-item">
                    <span class="mistake-word">📘 ${item.word}</span>
                    <span class="mistake-meaning">${item.meaning}</span>
                    <span class="mistake-unit">${getUnitDisplayName(item.unit)}</span>
                </div>
            `;
        });
        mistakeListContainer.innerHTML = html;
    }

    function showMistakeModal() {
        renderMistakeModal();
        mistakeModal.style.display = "flex";
    }

    function closeMistakeModal() {
        mistakeModal.style.display = "none";
    }

    function getCurrentWordPool() {
        if (currentUnit === "ALL") {
            return allWordsWithUnit;
        } else {
            return (vocabularyDB[currentUnit] || []).map(item => ({
                word: item.word,
                meaning: item.meaning,
                unit: currentUnit
            }));
        }
    }

    async function playRandomWord() {
        const pool = getCurrentWordPool();
        if (!pool.length) {
            alert("当前单元没有单词，请切换单元！");
            return false;
        }
        const randomIndex = Math.floor(Math.random() * pool.length);
        currentWordObj = { ...pool[randomIndex] };
        lastWordObj = { ...currentWordObj };
        await speakWord(currentWordObj.word);
        answerInput.value = "";
        feedbackEmoji.innerHTML = "😊";
        feedbackText.innerHTML = "等待作答";
        chineseHintDiv.innerHTML = "";
        answerInput.style.borderColor = "#ffcd94";
        return true;
    }

    function checkAnswer() {
        if (!currentWordObj) {
            feedbackEmoji.innerHTML = "⚠️";
            feedbackText.innerHTML = "请先点音量按钮";
            return;
        }
        const userAnswer = answerInput.value.trim().toLowerCase();
        const correctWord = currentWordObj.word.toLowerCase();
        const normalizedUser = userAnswer.replace(/\s+/g, ' ').trim();
        const normalizedCorrect = correctWord.replace(/\s+/g, ' ').trim();
        
        if (normalizedUser === normalizedCorrect) {
            playCorrectSound();
            feedbackEmoji.innerHTML = "😁";
            feedbackText.innerHTML = "正确！";
            answerInput.style.borderColor = "#4caf50";
        } else {
            playWrongSound();
            feedbackEmoji.innerHTML = "😭";
            feedbackText.innerHTML = "错误";
            answerInput.style.borderColor = "#f44336";
            if (currentWordObj) {
                addToMistakeList(currentWordObj);
            }
        }
    }

    async function replayLastWord() {
        if (lastWordObj) {
            await speakWord(lastWordObj.word);
            if (!currentWordObj) currentWordObj = { ...lastWordObj };
        } else {
            alert("还没有播放过单词，请先点击音量按钮");
        }
    }

    function cantWriteFill() {
        if (!currentWordObj) {
            alert("请先播放单词");
            return;
        }
        addToMistakeList(currentWordObj);
        answerInput.value = currentWordObj.word;
        checkAnswer();
        answerInput.focus();
    }

    function displayChinese() {
        if (!currentWordObj) {
            alert("没有播放单词");
            return;
        }
        chineseHintDiv.innerHTML = `📖 ${currentWordObj.meaning}`;
    }

    function buildUnitDropdown() {
        const units = [
            { code: "ALL", name: "📚 所有单元" },
            { code: "U1", name: "第一单元 (Unit 1)" },
            { code: "U2", name: "第二单元 (Unit 2)" },
            { code: "U3", name: "第三单元 (Unit 3)" },
            { code: "U4", name: "第四单元 (Unit 4)" },
            { code: "U5", name: "第五单元 (Unit 5)" },
            { code: "U6", name: "第六单元 (Unit 6)" }
        ];
        unitDropdown.innerHTML = "";
        units.forEach(unit => {
            const option = document.createElement("option");
            option.value = unit.code;
            option.textContent = unit.name;
            if (currentUnit === unit.code) option.selected = true;
            unitDropdown.appendChild(option);
        });
    }

    function setUnit(unitCode) {
        currentUnit = unitCode;
        let unitName = "";
        switch(currentUnit) {
            case "ALL": unitName = "全部单词"; break;
            case "U1": unitName = "第一单元"; break;
            case "U2": unitName = "第二单元"; break;
            case "U3": unitName = "第三单元"; break;
            case "U4": unitName = "第四单元"; break;
            case "U5": unitName = "第五单元"; break;
            case "U6": unitName = "第六单元"; break;
            default: unitName = "全部单词";
        }
        unitDisplaySpan.innerHTML = `当前单元：${unitName} (共${getCurrentWordPool().length}词)`;
        currentWordObj = null;
        lastWordObj = null;
        answerInput.value = "";
        feedbackEmoji.innerHTML = "😊";
        feedbackText.innerHTML = "等待作答";
        chineseHintDiv.innerHTML = "";
        playRandomWord();
    }

    function showUnitSelector() {
        if (unitDropdown.style.display === "none" || unitDropdown.style.display === "") {
            unitDropdown.style.display = "inline-block";
        } else {
            unitDropdown.style.display = "none";
        }
    }

    function onUnitChange(e) {
        const selectedVal = e.target.value;
        setUnit(selectedVal);
        unitDropdown.style.display = "none";
    }

    function onEnterPress(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            checkAnswer();
        }
    }

    function init() {
        buildUnitDropdown();
        setUnit("ALL");
        
        speakerBtn.addEventListener('click', async () => {
            await playRandomWord();
            feedbackEmoji.innerHTML = "😊";
            feedbackText.innerHTML = "等待作答";
            chineseHintDiv.innerHTML = "";
            answerInput.style.borderColor = "#ffcd94";
            answerInput.focus();
        });
        
        replayBtn.addEventListener('click', replayLastWord);
        cantWriteBtn.addEventListener('click', cantWriteFill);
        showChineseBtn.addEventListener('click', displayChinese);
        unitSelectBtn.addEventListener('click', showUnitSelector);
        unitDropdown.addEventListener('change', onUnitChange);
        answerInput.addEventListener('keypress', onEnterPress);
        mistakeLibraryBtn.addEventListener('click', showMistakeModal);
        closeModalBtn.addEventListener('click', closeMistakeModal);
        window.addEventListener('click', (e) => {
            if (e.target === mistakeModal) closeMistakeModal();
        });
        document.addEventListener('click', function(e) {
            if (!unitSelectBtn.contains(e.target) && !unitDropdown.contains(e.target)) {
                if (unitDropdown.style.display === "inline-block") unitDropdown.style.display = "none";
            }
        });
    }
    
    init();
</script>
</body>
</html>
